name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: docs
        run: bun install

      - name: Build
        working-directory: docs
        run: bun run build:export
        env:
          BASE_PATH: /protoc-gen-nextra

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

      - uses: actions/deploy-pages@v4
        id: deployment
