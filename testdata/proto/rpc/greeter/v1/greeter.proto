syntax = "proto3";

package greeter.v1;

import "nextra/options.proto";

option go_package = "github.com/jamillosantos/protoc-gen-nextra/testdata/rpc/greeter/v1";

// GreeterService provides greeting functionality.
service Greeter {
  // SayHello sends a greeting to the server.
  rpc SayHello (HelloRequest) returns (HelloReply) {
    option (nextra.method_errors) = {
      errors: [
        {
          code: "NOT_FOUND",
          description: "the requested person was not found."
        },
        {
          code: "INVALID_ARGUMENT",
          description: "input validation failed.",
          detail_type: "google.rpc.BadRequest",
          fields: [
            { name: "field_violations[0].field",       value: "name" },
            { name: "field_violations[0].description", value: "must not be empty." },
            { name: "field_violations[1].field",       value: "language" },
            { name: "field_violations[1].description", value: "must be a valid BCP-47 language tag." }
          ]
        }
      ]
    };
  }

  // SayHelloStream streams greetings back to the client.
  rpc SayHelloStream (HelloRequest) returns (stream HelloReply);
}

// FarewellService provides farewell functionality.
service Farewell {
  // SayGoodbye sends a farewell message.
  rpc SayGoodbye (GoodbyeRequest) returns (GoodbyeReply) {
    option (nextra.method_errors) = {
      errors: [
        {
          code: "NOT_FOUND",
          description: "the requested person was not found."
        }
      ]
    };
  }
}

// GoodbyeRequest is the request message for the Farewell service.
message GoodbyeRequest {
  // name is the name of the person to say goodbye to.
  string name = 1;
}

// GoodbyeReply is the response message for the Farewell service.
message GoodbyeReply {
  // message is the farewell message.
  string message = 1;
}

// HelloRequest is the request message for the Greeter service.
message HelloRequest {
  // name is the name of the person to greet.
  string name = 1;

  // language optionally selects the greeting language.
  optional string language = 2;
}

// HelloReply is the response message for the Greeter service.
message HelloReply {
  // message is the greeting message.
  string message = 1;
}
